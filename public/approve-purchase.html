<!DOCTYPE html>
<html lang="pt-AO">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aprovação de Compra - Tasca do Vereda</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      width: 100%;
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .logo {
      width: 80px;
      height: 80px;
      background: #06b6d4;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .logo svg {
      width: 40px;
      height: 40px;
      color: white;
    }
    h1 {
      color: white;
      text-align: center;
      font-size: 28px;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #94a3b8;
      text-align: center;
      margin-bottom: 32px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .detail-row:last-child {
      border-bottom: none;
    }
    .detail-label {
      color: #94a3b8;
      font-size: 14px;
    }
    .detail-value {
      color: white;
      font-weight: 600;
    }
    .amount {
      font-size: 24px;
      color: #06b6d4;
    }
    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    button {
      padding: 16px 24px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-approve {
      background: #22c55e;
      color: white;
    }
    .btn-approve:hover {
      background: #16a34a;
    }
    .btn-reject {
      background: #ef4444;
      color: white;
    }
    .btn-reject:hover {
      background: #dc2626;
    }
    .loading {
      text-align: center;
      color: white;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #06b6d4;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    .success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #22c55e;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    .warning {
      background: rgba(234, 179, 8, 0.1);
      border: 1px solid rgba(234, 179, 8, 0.3);
      color: #eab308;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 24px;
    }
    .debug {
      background: rgba(0,0,0,0.3);
      padding: 12px;
      border-radius: 8px;
      margin-top: 16px;
      font-family: monospace;
      font-size: 12px;
      color: #64748b;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <p>Carregando...</p>
    </div>
  </div>

  <script>
    // Configuração Supabase
    const SUPABASE_URL = 'https://tboiuiwlqfzcvakxrsmj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRib2l1aXdscWZ6Y3Zha3hyc21qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzc5MzksImV4cCI6MjA4ODY1MzkzOX0.-ioGcbogZMqLTtt0Up6DkPTAsROUmPDSokXPgHJgWBU';
    
    // Criar cliente Supabase com nome diferente para evitar conflito
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Parse URL - usar URLSearchParams para query parameters
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    const token = urlParams.get('token');
    
    const app = document.getElementById('app');
    
    function formatKz(value) {
      return new Intl.NumberFormat('pt-AO', {
        style: 'currency',
        currency: 'AOA'
      }).format(value).replace('AOA', 'Kz');
    }
    
    function formatDate(dateString) {
      return new Date(dateString).toLocaleDateString('pt-AO', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }
    
    async function loadPurchase() {
      if (!id || !token || id === 'approve-purchase') {
        app.innerHTML = `
          <div class="container">
            <div class="error">
              <h2>Link Inválido</h2>
              <p>Este link de aprovação não é válido.</p>
              <div class="debug">ID: ${id}<br>Token: ${token}</div>
            </div>
          </div>
        `;
        return;
      }
      
      try {
        console.log('Buscando pedido com ID:', id);
        const { data, error } = await supabaseClient
          .from('purchase_requests')
          .select('*')
          .eq('id', id)
          .single();
        
        console.log('Resposta Supabase:', { data, error });
        
        if (error) {
          app.innerHTML = `
            <div class="container">
              <div class="error">
                <h2>Erro ao Buscar Pedido</h2>
                <p>${error.message}</p>
                <div class="debug">ID: ${id}<br>Erro: ${error.message}</div>
              </div>
            </div>
          `;
          return;
        }
        
        if (!data) {
          app.innerHTML = `
            <div class="container">
              <div class="error">
                <h2>Pedido Não Encontrado</h2>
                <p>Este pedido de compra não existe ou foi removido.</p>
                <div class="debug">ID buscado: ${id}</div>
              </div>
            </div>
          `;
          return;
        }
        
        if (data.status !== 'pendente') {
          app.innerHTML = `
            <div class="container">
              <div class="success">
                <h2>Pedido Já Processado</h2>
                <p>Este pedido já foi ${data.status === 'aprovado' ? 'aprovado' : 'rejeitado'}.</p>
              </div>
            </div>
          `;
          return;
        }
        
        renderPurchase(data);
      } catch (err) {
        app.innerHTML = `
          <div class="container">
            <div class="error">
              <h2>Erro</h2>
              <p>Ocorreu um erro ao carregar o pedido.</p>
              <div class="debug">${err.message}</div>
            </div>
          </div>
        `;
      }
    }
    
    function renderPurchase(purchase) {
      app.innerHTML = `
        <div class="container">
          <div class="logo">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
          </div>
          <h1>Aprovação de Compra</h1>
          <p class="subtitle">Revise os detalhes e aprove ou rejeite</p>
          
          <div class="warning">
            <strong>Atenção:</strong> Ao aprovar, o valor será registrado como despesa no sistema.
          </div>
          
          <div class="card">
            <div class="detail-row">
              <span class="detail-label">Descrição</span>
              <span class="detail-value">${purchase.description}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Valor</span>
              <span class="detail-value amount">${formatKz(purchase.amount)}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Fornecedor</span>
              <span class="detail-value">${purchase.provider}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Data do Pedido</span>
              <span class="detail-value">${formatDate(purchase.created_at)}</span>
            </div>
          </div>
          
          <div class="buttons">
            <button class="btn-approve" onclick="handleApprove()">
              <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
              </svg>
              APROVAR
            </button>
            <button class="btn-reject" onclick="handleReject()">
              <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
              REJEITAR
            </button>
          </div>
        </div>
      `;
    }
    
    async function handleApprove() {
      app.innerHTML = `
        <div class="container">
          <div class="loading">
            <div class="spinner"></div>
            <p>Processando aprovação...</p>
          </div>
        </div>
      `;
      
      try {
        // 1. Verificar se ainda está pendente (anti-duplicidade)
        const { data: currentData, error: checkError } = await supabaseClient
          .from('purchase_requests')
          .select('status, description')
          .eq('id', id)
          .single();
        
        if (checkError) throw checkError;
        
        if (currentData.status !== 'pendente') {
          app.innerHTML = `
            <div class="container">
              <div class="success" style="background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.3);">
                <svg width="64" height="64" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin: 0 auto 16px; display: block; color: #f59e0b;">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                <h2 style="color: #f59e0b;">Pedido Já Processado</h2>
                <p>Este pedido já foi <strong>${currentData.status === 'aprovado' ? 'aprovado' : 'rejeitado'}</strong> por outro utilizador.</p>
                <p style="margin-top: 8px; font-size: 14px;">${currentData.description}</p>
              </div>
            </div>
          `;
          return;
        }
        
        // 2. Atualizar status
        const { error: updateError } = await supabaseClient
          .from('purchase_requests')
          .update({ 
            status: 'aprovado',
            approved_at: new Date().toISOString()
          })
          .eq('id', id)
          .eq('status', 'pendente'); // Só atualiza se ainda estiver pendente
        
        if (updateError) throw updateError;
        
        // 3. Criar despesa na tabela expenses (para atualizar o dashboard)
        const { error: expenseError } = await supabaseClient
          .from('expenses')
          .insert({
            description: `Compra Aprovada: ${currentData.description}`,
            amount_kz: currentData.amount,
            category: 'COMPRAS',
            status: 'PENDING',
            created_at: new Date().toISOString()
          });
          
        if (expenseError) {
          console.error('Erro ao criar despesa:', expenseError);
        }
        
        // 4. Registrar despesa em cash_flow
        await supabaseClient
          .from('cash_flow')
          .insert({
            amount: currentData.amount,
            type: 'saida',
            category: 'Compras',
            description: `Compra Aprovada: ${currentData.description} - ${currentData.provider}`
          });
        
        app.innerHTML = `
          <div class="container">
            <div class="success">
              <svg width="64" height="64" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin: 0 auto 16px; display: block;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <h2>Compra Aprovada!</h2>
              <p>A compra foi aprovada e registrada como despesa.</p>
            </div>
          </div>
        `;
      } catch (err) {
        app.innerHTML = `
          <div class="container">
            <div class="error">
              <h2>Erro</h2>
              <p>Ocorreu um erro ao aprovar: ${err.message}</p>
            </div>
          </div>
        `;
      }
    }
    
    async function handleReject() {
      app.innerHTML = `
        <div class="container">
          <div class="loading">
            <div class="spinner"></div>
            <p>Processando rejeição...</p>
          </div>
        </div>
      `;
      
      try {
        // 1. Verificar se ainda está pendente (anti-duplicidade)
        const { data: currentData, error: checkError } = await supabaseClient
          .from('purchase_requests')
          .select('status, description')
          .eq('id', id)
          .single();
        
        if (checkError) throw checkError;
        
        if (currentData.status !== 'pendente') {
          app.innerHTML = `
            <div class="container">
              <div class="success" style="background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.3);">
                <svg width="64" height="64" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin: 0 auto 16px; display: block; color: #f59e0b;">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                <h2 style="color: #f59e0b;">Pedido Já Processado</h2>
                <p>Este pedido já foi <strong>${currentData.status === 'aprovado' ? 'aprovado' : 'rejeitado'}</strong> por outro utilizador.</p>
                <p style="margin-top: 8px; font-size: 14px;">${currentData.description}</p>
              </div>
            </div>
          `;
          return;
        }
        
        // 2. Atualizar status
        const { error } = await supabaseClient
          .from('purchase_requests')
          .update({ 
            status: 'rejeitado',
            approved_at: new Date().toISOString()
          })
          .eq('id', id)
          .eq('status', 'pendente'); // Só atualiza se ainda estiver pendente
        
        if (error) throw error;
        
        app.innerHTML = `
          <div class="container">
            <div class="error" style="background: rgba(239, 68, 68, 0.1);">
              <svg width="64" height="64" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin: 0 auto 16px; display: block;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <h2>Compra Rejeitada</h2>
              <p>O pedido de compra foi rejeitado.</p>
            </div>
          </div>
        `;
      } catch (err) {
        app.innerHTML = `
          <div class="container">
            <div class="error">
              <h2>Erro</h2>
              <p>Ocorreu um erro ao rejeitar: ${err.message}</p>
            </div>
          </div>
        `;
      }
    }
    
    // Iniciar
    loadPurchase();
  </script>
</body>
</html>
